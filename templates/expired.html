<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Surpresa encerrada</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(130deg, #fff4f6, #ffe9ef);
      color: #61182f;
      padding: 24px;
    }
    .card {
      width: min(620px, 95vw);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #f3b4c6;
      border-radius: 18px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 16px 30px rgba(123, 31, 56, 0.12);
    }
    h1 {
      margin-top: 0;
      color: #8d1f43;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Essa surpresa foi encerrada com carinho</h1>
    <p>Este link ficou disponivel por tempo limitado e foi finalizado.</p>
    {% if expires_on %}
      <p>Encerramento automatico em: <strong>{{ expires_on }}</strong>.</p>
    {% endif %}
  </main>
</body>
</html>
